version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      next:
        patterns:
          - next
          - "eslint-config-next"
          - "@next/*"
      keystatic:
        patterns:
          - "@keystatic/*"
      react:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      tailwind:
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
      test-tooling:
        patterns:
          - vitest
          - "@vitest/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
